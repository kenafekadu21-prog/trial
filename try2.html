<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory</title>
<style>
body { font-family: Arial; background: #f5f5f5; padding: 20px; }
h1 { text-align: center; }
.controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
input, button { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
.grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 15px; }
.product { background:#fff; padding:15px; border-radius:8px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.product img { width:100%; height:150px; object-fit:cover; border-radius:5px; }
.available { color:green; font-weight:bold; }
.sold { color:red; font-weight:bold; }
button { border:none; background:#007bff; color:white; cursor:pointer; }
button:disabled { background:#ccc; cursor:default; }
</style>
</head>
<body>

<h1>Inventory</h1>

<div class="controls">
<input type="text" id="search" placeholder="Search products...">
<label><input type="checkbox" id="availableOnly"> Available only</label>
</div>

<div class="controls">
<input type="text" id="newName" placeholder="Product name">
<input type="text" id="newPrice" placeholder="Price ($)">
<button id="addProduct">Add Product</button>
</div>

<div class="grid" id="productGrid"></div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [
    {id:1,name:"Laptop",price:"$1200",status:"Available",image:"https://via.placeholder.com/220x150?text=Laptop"},
    {id:2,name:"Phone",price:"$800",status:"Sold",image:"https://via.placeholder.com/220x150?text=Phone"},
];

// Save to localStorage
function saveProducts() { localStorage.setItem('products', JSON.stringify(products)); }

const productGrid = document.getElementById('productGrid');
const searchInput = document.getElementById('search');
const availableCheckbox = document.getElementById('availableOnly');
const newName = document.getElementById('newName');
const newPrice = document.getElementById('newPrice');
const addProductBtn = document.getElementById('addProduct');

function renderProducts() {
    const searchText = searchInput.value.toLowerCase();
    const availableOnly = availableCheckbox.checked;
    productGrid.innerHTML = '';

    products
        .filter(p=>p.name.toLowerCase().includes(searchText))
        .filter(p=>!availableOnly || p.status==="Available")
        .forEach(p=>{
            const div = document.createElement('div');
            div.className = 'product';
            div.innerHTML = `
                <img src="${p.image}" alt="${p.name}">
                <h3>${p.name}</h3>
                <p>Price: ${p.price}</p>
                <p>Status: <span class="${p.status==="Available"?"available":"sold"}">${p.status}</span></p>
                <button ${p.status==="Sold"?'disabled':''} onclick="markSold(${p.id})">Mark as Sold</button>
                <button style="background:red;margin-top:5px;" onclick="removeProduct(${p.id})">Remove</button>
            `;
            productGrid.appendChild(div);
        });
}

// Mark Sold
function markSold(id){
    const p = products.find(x=>x.id===id);
    if(p){ p.status="Sold"; saveProducts(); renderProducts(); }
}

// Remove
function removeProduct(id){
    products = products.filter(x=>x.id!==id);
    saveProducts();
    renderProducts();
}

// Add new product
addProductBtn.addEventListener('click',()=>{
    const name = newName.value.trim();
    const price = newPrice.value.trim();
    if(!name || !price) return alert("Enter name and price");
    const id = Date.now();
    products.push({id,name,price,status:"Available",image:"https://via.placeholder.com/220x150?text="+encodeURIComponent(name)});
    newName.value=""; newPrice.value="";
    saveProducts();
    renderProducts();
});

// Filters
searchInput.addEventListener('input', renderProducts);
availableCheckbox.addEventListener('change', renderProducts);

// Initial render
renderProducts();
</script>
</body>
</html>
